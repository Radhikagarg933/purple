version: "3.9"

services:

  api:

    build: .

    ports:
      - "8000:8000"

    depends_on:
      - db

  db:

    image: postgres:15

    environment:

      POSTGRES_DB: storeintel

      POSTGRES_USER: admin

      POSTGRES_PASSWORD: admin

    ports:
      - "5432:5432"

  redis:

    image: redis:7

    ports:
      - "6379:6379"